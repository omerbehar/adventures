name: adventures
description: >-
  A text-first RPG where you type whatever you want to do, and the world
  translates your intent into hand-authored, consequential events.

publish_to: 'none'

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/scenes/
    - assets/narration/

# Initial scaffold for the Adventures project.
# This pubspec.yaml is a minimal baseline; expand with actual dependencies
# as systems are implemented. See docs/architecture/ for system definitions.
