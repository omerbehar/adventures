name: Test & Lint

on:
  push:
    branches: ['main', 'develop']
  pull_request:
    branches: ['main', 'develop']

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run analyzer
        run: flutter analyze
        continue-on-error: false

      - name: Check code formatting
        run: dart format --output=none --set-exit-if-changed .
        continue-on-error: false

      - name: Check core import discipline
        # ADR-0009 layering gate: the pure-Dart core (lib/game, lib/resolver, lib/scene)
        # must never import package:flutter / dart:ui. Fails the build if it does.
        run: dart run tool/check_core_imports.dart
        continue-on-error: false

      - name: Lint authored scenes
        # Deterministic Scene Linter (ADR-0005) over every assets/scenes/*.json.
        # Fails the build on any parse error or error-severity finding.
        run: dart run tool/lint_scenes.dart
        continue-on-error: false

      - name: Run unit and widget tests
        # Tests live under tests/ (project convention), not the default test/ dir.
        run: flutter test tests/unit --coverage
        continue-on-error: false

      - name: Run integration tests
        # Only run if integration test files exist (avoids "no tests found" failures
        # while tests/integration/ is still a placeholder).
        run: |
          if ls tests/integration/**/*_test.dart >/dev/null 2>&1; then
            flutter test tests/integration
          else
            echo "No integration tests yet — skipping."
          fi
        continue-on-error: false

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info
          flags: flutter
          name: flutter-coverage
        continue-on-error: true
